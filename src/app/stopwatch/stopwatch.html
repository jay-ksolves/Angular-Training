<app-card title="Stopwatch" description="">

  <p class="text-3xl font-bold font-mono text-indigo-900 mb-6">
    {{ timer() | timerPipe }}
  </p>

  <div class="flex gap-3">
    <button 
      (click)="startTimer()"
      [disabled]="isRunning()"
      class="px-6 py-3 rounded-lg bg-green-600 hover:bg-green-700 text-white font-medium disabled:opacity-50">
      Start
    </button>

    <button 
      (click)="pauseTimer()"
      [disabled]="!isRunning()"
      class="px-6 py-3 rounded-lg bg-yellow-600 hover:bg-yellow-700 text-white font-medium disabled:opacity-50">
      Pause
    </button>

    <button 
      (click)="stopTimer()"
      class="px-6 py-3 rounded-lg bg-red-600 hover:bg-red-700 text-white font-medium">
      Reset
    </button>
  </div>
</app-card>
