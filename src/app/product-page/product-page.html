<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-100 pb-6 mb-8">
    <div>
      <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
        Our Products
      </h1>
      <p class="text-sm text-gray-500 mt-1">Explore our latest collection of items styled just for you.</p>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    @for (product of products(); track product.id) {
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col h-full overflow-hidden group transform hover:-translate-y-1">
        <!-- Image Wrapper -->
        <div class="relative h-48 bg-gray-50/50 p-6 flex items-center justify-center overflow-hidden">
          <img
            [src]="product.image"
            [alt]="product.title"
            class="object-contain max-h-full max-w-full transition-transform duration-500 group-hover:scale-105"
          />
          <span class="absolute top-3 left-3 bg-white/95 backdrop-blur px-2.5 py-1 rounded-full text-[10px] font-bold text-gray-500 shadow-sm uppercase tracking-wider">
            {{ product.category }}
          </span>
        </div>

        <!-- Content -->
        <div class="p-5 flex flex-col flex-grow">
          <!-- Rating -->
          <div class="flex items-center gap-1 mb-2">
            <span class="text-amber-400 text-sm">★</span>
            <span class="text-xs font-bold text-gray-700">{{ product.rating.rate }}</span>
            <span class="text-xs text-gray-400">({{ product.rating.count }})</span>
          </div>

          <!-- Title -->
          <h3 class="font-bold text-gray-800 text-sm line-clamp-2 mb-1 group-hover:text-indigo-600 transition-colors duration-200" [title]="product.title">
            {{ product.title }}
          </h3>

          <!-- Description -->
          <p class="text-xs text-gray-500 line-clamp-2 mb-4 flex-grow">
            {{ product.description }}
          </p>

          <!-- Price & Button -->
          <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between gap-4">
            <div class="flex flex-col">
              <span class="text-[10px] text-gray-400 uppercase font-semibold">Price</span>
              <span class="text-lg font-extrabold text-indigo-600">${{ product.price }}</span>
            </div>
            <button
              (click)="AddToCart(product)"
              class="px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xs font-bold rounded-xl shadow-md hover:shadow-lg transition-all duration-300 transform active:scale-95 cursor-pointer">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
