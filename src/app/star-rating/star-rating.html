<div class="container mx-auto mt-4 mb-4 border-slate-200 border border-radius-4 p-4">
  <hr />
  <h1 class="text-3xl font-bold underline mb-4">Welcome to rating demo</h1>

  <p>Rate your experience here:</p>

  @for (star of stars(); track star) {
    <button
      class="text-yello-400 text-6xl cursor-pointer transition-all duration-300 hover:scale-120 hover:text-yellow-800"
      (click)="rate(star)"
    >
      *
    </button>
  }
  <p>you have rated {{ userRating() }} out of 5</p>
</div>
