<div class="flex flex-col items-center justify-center p-6 font-sans">
  <div class="w-full max-w-sm p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl space-y-6 text-slate-100">

    <div class="flex flex-col items-center text-center space-y-3">
      <img [src]="imageUrl" [alt]="altText"
        class="w-20 h-20 rounded-full object-cover border-2 border-indigo-500 shadow-md shadow-indigo-500/20">
      <h1 class="text-xl font-semibold text-slate-100">{{title}}</h1>
    </div>

    <div class="space-y-4">
      <div class="space-y-1.5">
        <label for="username-input" class="text-xs font-medium text-slate-400">Username</label>
        <input id="username-input" type="text" [value]="userName"
          class="w-full px-3.5 py-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all" />
      </div>

      <button [disabled]="isActive" (click)="incrementCount()" type="button"
        class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium text-sm rounded-lg transition-all shadow-md shadow-indigo-600/10">
        Login
      </button>
    </div>

    <div class="pt-4 border-t border-slate-800 flex items-center justify-between text-xs text-slate-500">
      <span>Signal State Tracker</span>
      <span class="font-mono bg-slate-950 border border-slate-800 px-2 py-0.5 rounded text-indigo-400">count:
        {{count()}}</span>
    </div>

  </div>
</div>
