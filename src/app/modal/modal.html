<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 mx-4 border border-slate-100 flex flex-col gap-4 animate-in fade-in zoom-in-95 duration-200">
    <div class="text-xl font-bold text-slate-800 border-b border-slate-100 pb-3">
      <ng-content select="[modalTitle]"></ng-content>
    </div>
    <div class="text-slate-600 py-1">
      <ng-content select="[modalBody]"></ng-content>
    </div>
    <div class="flex justify-end gap-3 border-t border-slate-100 pt-3">
      <ng-content select="[modalActions]"></ng-content>
    </div>
  </div>
</div>
